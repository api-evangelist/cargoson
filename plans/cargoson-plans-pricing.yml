    Entry monthly subscription tier for smaller shippers. Indicative price
    reported at ~EUR 199/month; confirm scope and inclusions with Cargoson.
  entries:
  - label: Monthly Subscription
    name: retail_monthly
    type: flat
    metric: subscription
    limit: -1
    timeFrame: month
    geo: global
    unit: 1
    price: ~EUR 199/month (indicative, confirm with sales)
    userMultiplied: false
  elements:
