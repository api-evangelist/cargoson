specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Cargoson
providerId: cargoson
created: '2026-06-21'
modified: '2026-06-21'
reconciled: false
tags:
- Transport Management
- TMS
- Freight
- Shipping
- Logistics
- Carriers
- Plans
description: >-
  Cargoson is sold as a flat monthly SaaS subscription with no per-shipment fees
  or commissions; API access is included with a Cargoson account rather than
  metered separately. Published tier names and prices (Retail, Industry,
  Corporation, Custom) have been seen on third-party listings and may change;
  pricing is ultimately sales-led via demo. Tier scope, included carriers, and
  user/seat limits are not fully documented publicly, so this artifact is not
  reconciled.
notes: >-
  Prices below are indicative figures reported by third-party software-listing
  sites, not confirmed against an official Cargoson price sheet. Confirm current
  tiers, inclusions, and limits with Cargoson sales during reconciliation.
sources:
- https://www.cargoson.com/
- https://www.cargoson.com/en/integrations
- https://softwarefinder.com/supply-chain-management/cargoson
