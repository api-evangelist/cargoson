- aid: cargoson:webhooks
  name: Cargoson Webhooks
  tags:
  - Webhooks
  - Events
  - Notifications
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.cargoson.com/en/blog/what-are-webhooks-and-how-do-they-work
  baseURL: https://www.cargoson.com/api/v1
  properties:
  - url: https://www.cargoson.com/en/blog/what-are-webhooks-and-how-do-they-work
    type: Documentation
  description: Cargoson can deliver real-time event notifications (shipment status
    updates, booking confirmations, shipment changes) to a customer-configured
    endpoint URL, set up under Settings > Integrations > Webhooks. Public payload
    schemas are not documented; setup is arranged with Cargoson support.
