meters:
- name: subscription_fee
  description: Flat monthly subscription fee for the selected Cargoson plan.
  unit: months
  aggregation: sum
  dimensions:
  - account
  - plan
- name: shipments_booked
  description: >-
    Count of shipments booked through Cargoson. Not billed per-shipment by
    Cargoson; tracked for allocation and unit-economics analysis.
  unit: shipments
  aggregation: sum
  dimensions:
  - account
  - carrier
- name: carrier_freight_cost
  description: >-
    Freight charges contracted directly between the customer and carriers.
    Tracked outside Cargoson's invoice; included for total cost-of-shipping
    visibility.
  unit: currency
  aggregation: sum
  dimensions:
  - account
  - carrier
principles:
- name: Visibility
  description: >-
    Track the flat Cargoson subscription alongside per-carrier freight spend to
    see total cost of shipping in one place.
- name: Allocation
  description: >-
    Tag bookings by carrier, business unit, or cost center to allocate both the
    subscription and the underlying freight costs.
- name: Optimization
  description: >-
    Use freight rate comparison (POST /freightPrices/list) to select the
    best-value carrier service per shipment, and right-size the subscription tier
    to actual volume.
- name: Accountability
  description: >-
    Assign owners per account/plan; review subscription tier fit and carrier
    spend periodically against budget.
