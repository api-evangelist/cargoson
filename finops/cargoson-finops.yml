description: >-
  FinOps view of Cargoson spend. Cargoson bills a flat monthly SaaS subscription
  per the selected plan (Retail, Industry, Corporation, or Custom), with no
  per-shipment fees or commissions on the Cargoson side; API access is included
  in the subscription rather than metered. Actual freight/carrier charges are
  contracted and paid directly between the customer and their carriers, outside
  Cargoson's billing. Exact tier prices are sales-led and not fully published, so
  this artifact is not reconciled.
notes: >-
  Subscription tier prices are indicative (third-party listings) and may change;
  confirm against an official Cargoson quote during reconciliation. Underlying
  carrier freight costs are not billed by Cargoson and are tracked separately.
sources:
- https://www.cargoson.com/
