billingModel:
  pricingCategory: Subscription-Based
  billingFrequency: Monthly
  billingCurrency: EUR
  chargeCategories:
  - Purchase
  - Usage
  - Adjustment
focusColumns:
  ServiceName: Cargoson TMS
  ServiceCategory: Logistics and Transport Management
